# BHUB Backend - Docker Compose
version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bhub-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://bhub:bhub@db:5432/bhub}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - ENABLE_ARQ=${ENABLE_ARQ:-true}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DEBUG=${DEBUG:-false}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - HUGGINGFACE_API_KEY=${HUGGINGFACE_API_KEY:-}
      - CRON_SECRET=${CRON_SECRET:-}
      - ENABLE_SCHEDULER=true
    depends_on:
      - db
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  arq-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bhub-arq-worker
    restart: unless-stopped
    command: arq app.jobs.tasks.WorkerSettings
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://bhub:bhub@db:5432/bhub}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - ENABLE_ARQ=true
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DEBUG=${DEBUG:-false}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - HUGGINGFACE_API_KEY=${HUGGINGFACE_API_KEY:-}
      - ENABLE_SCHEDULER=false
    depends_on:
      - db
      - redis

  db:
    image: postgres:16-alpine
    container_name: bhub-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-bhub}
      - POSTGRES_USER=${POSTGRES_USER:-bhub}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-bhub}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: bhub-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

volumes:
  uploads:
  logs:
  postgres_data:
  redis_data:
