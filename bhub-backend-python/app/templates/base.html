<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}BHUB - Behavior Hub{% endblock %}</title>

    <!-- Meta Tags Base -->
    <meta name="description" content="{% block meta_description %}BHUB - Plataforma inteligente para agregação e análise de artigos científicos em Análise do Comportamento.{% endblock %}" />
    <meta name="keywords" content="{% block meta_keywords %}análise do comportamento, artigos científicos, pesquisa, behavior analysis{% endblock %}" />
    <meta name="author" content="BHUB" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="{% block og_type %}website{% endblock %}" />
    <meta property="og:url" content="{% block og_url %}{{ request.url if request else '' }}{% endblock %}" />
    <meta property="og:title" content="{% block og_title %}BHUB - Behavior Hub{% endblock %}" />
    <meta property="og:description" content="{% block og_description %}BHUB - Plataforma inteligente para agregação e análise de artigos científicos em Análise do Comportamento.{% endblock %}" />
    <meta property="og:image" content="{% block og_image %}{{ request.base_url if request else '' }}static/images/og-default.png{% endblock %}" />
    <meta property="og:site_name" content="BHUB" />
    <meta property="og:locale" content="pt_BR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="{% block twitter_card %}summary_large_image{% endblock %}" />
    <meta name="twitter:title" content="{% block twitter_title %}BHUB - Behavior Hub{% endblock %}" />
    <meta name="twitter:description" content="{% block twitter_description %}BHUB - Plataforma inteligente para agregação e análise de artigos científicos em Análise do Comportamento.{% endblock %}" />
    <meta name="twitter:image" content="{% block twitter_image %}{{ request.base_url if request else '' }}static/images/og-default.png{% endblock %}" />

    <!-- Additional Meta Tags -->
    {% block extra_meta %}{% endblock %}

    <!-- Design Tokens (Paleta Oficial) -->
    <link rel="stylesheet" href="{{ url_for('static', path='css/design-tokens.css') }}">

    <!-- Accessibility CSS -->
    <link rel="stylesheet" href="{{ url_for('static', path='css/accessibility.css') }}">

    <!-- Responsive CSS -->
    <link rel="stylesheet" href="{{ url_for('static', path='css/responsive.css') }}">

    <!-- Animations CSS -->
    <link rel="stylesheet" href="{{ url_for('static', path='css/animations.css') }}">

    <!-- Article Card CSS -->
    <link rel="stylesheet" href="{{ url_for('static', path='css/article-card.css') }}">

    <!-- Article Detail CSS -->
    <link rel="stylesheet" href="{{ url_for('static', path='css/article-detail.css') }}">

    <!-- Tailwind CSS - Compilado localmente -->
    <link rel="stylesheet" href="{{ url_for('static', path='css/output.css') }}">

    <!-- Em desenvolvimento: usar CDN apenas se necessário para testes rápidos -->
    <!-- <script src="https://cdn.tailwindcss.com"></script> -->

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10/dist/ext/json-enc.js"></script>
    <script>
      // Disable history cache to prevent localStorage quota errors
      htmx.config.historyCacheSize = 0;
    </script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Anime.js - Biblioteca de animações -->
    <script src="https://cdn.jsdelivr.net/npm/animejs@3.2.2/lib/anime.min.js"></script>

    <!-- Marked.js for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- Inter Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      .htmx-indicator {
        opacity: 0;
        transition: opacity 200ms ease-in;
        pointer-events: none;
      }
      .htmx-request .htmx-indicator {
        opacity: 1;
        pointer-events: auto;
      }
      .htmx-request.htmx-indicator {
        opacity: 1;
        pointer-events: auto;
      }
    </style>

    {% block extra_head %}{% endblock %}
  </head>
  <body class="bg-slate-50 font-sans antialiased min-h-screen flex flex-col">
    <!-- Skip to main content -->
    <a href="#main-content" class="skip-to-main focus:top-0">
      Pular para o conteúdo principal
    </a>

    <!-- Navbar -->
    {% include 'components/navbar.html' %}

    <!-- Main Content -->
    <main id="main-content" class="flex-grow container mx-auto px-4 py-8" tabindex="-1">
      {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    {% include 'components/footer.html' %}

    <!-- Modals Container -->
    <div
      id="modal-container"
      class="relative z-50"
      aria-labelledby="modal-title"
      role="dialog"
      aria-modal="true"
    ></div>

    <!-- Toast/Notifications Container -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2" aria-live="polite" aria-atomic="true"></div>

    <!-- App JS -->
    <script src="{{ url_for('static', path='js/app.js') }}"></script>

    <!-- Animations JS (Anime.js) -->
    <script src="{{ url_for('static', path='js/animations.js') }}"></script>

    <!-- Keyboard Shortcuts -->
    <script src="{{ url_for('static', path='js/keyboard-shortcuts.js') }}"></script>

    <script>
      // Initialize Lucide Icons
      lucide.createIcons();

      // Re-initialize icons after HTMX swaps
      document.body.addEventListener("htmx:afterSwap", () => {
        lucide.createIcons();
      });

      // Handle HTMX History Cache Errors
      document.body.addEventListener('htmx:historyCacheError', function(evt) {
          console.warn('HTMX History Cache Error: Clearing cache to recover...');
          if(window.localStorage) {
              localStorage.removeItem('htmx-history-cache');
          }
      });

      // Scroll animations agora são gerenciadas por anime.js (animations.js)
      // O código antigo foi movido para animations.js para melhor integração
    </script>

    {% block extra_scripts %}{% endblock %}
  </body>
</html>
