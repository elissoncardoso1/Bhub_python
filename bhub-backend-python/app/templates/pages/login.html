{% extends "base.html" %}

{% block content %}
  <section class="bg-white rounded-xl shadow-lg border border-primary-200 p-6 sm:p-8 max-w-md mx-auto my-8">
    <div>
      <h1 class="text-xl sm:text-2xl font-bold text-primary-900 mb-2">Entrar</h1>
      <div class="text-sm sm:text-base text-primary-700 mb-6">
        Use seu email e senha para acessar áreas administrativas.
      </div>

      {% if error %}
        <div class="mb-4 p-4 bg-error-50 border border-error-500 rounded-lg text-error-700" role="alert">
          <div class="flex items-center gap-2">
            <svg class="w-5 h-5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true">
              <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
            </svg>
            <span class="text-sm">{{ error }}</span>
          </div>
        </div>
      {% endif %}

      <form method="post" action="/login">
        <div class="mb-4">
          <label for="username" class="block text-sm font-medium text-primary-700 mb-2">
            Email
          </label>
          <input
            id="username"
            name="username"
            type="email"
            required
            autocomplete="email"
            inputmode="email"
            class="w-full px-4 py-3 sm:py-2.5 border border-primary-300 rounded-lg focus:ring-2 focus:ring-primary-400 focus:border-transparent text-primary-900 bg-white transition-colors text-base min-h-[48px] sm:min-h-[44px]"
            aria-required="true"
            aria-describedby="email-description"
          />
          <p id="email-description" class="sr-only">Digite seu endereço de email</p>
        </div>

        <div class="mb-6">
          <label for="password" class="block text-sm font-medium text-primary-700 mb-2">
            Senha
          </label>
          <input
            id="password"
            name="password"
            type="password"
            required
            autocomplete="current-password"
            class="w-full px-4 py-3 sm:py-2.5 border border-primary-300 rounded-lg focus:ring-2 focus:ring-primary-400 focus:border-transparent text-primary-900 bg-white transition-colors text-base min-h-[48px] sm:min-h-[44px]"
            aria-required="true"
            aria-describedby="password-description"
          />
          <p id="password-description" class="sr-only">Digite sua senha</p>
        </div>

        {% if next_url %}
          <input type="hidden" name="next" value="{{ next_url }}" />
        {% endif %}

        <div class="flex flex-col-reverse sm:flex-row gap-3 sm:gap-4">
          <a
            href="/"
            class="flex items-center justify-center px-6 py-3 sm:py-2.5 border border-primary-300 text-primary-700 rounded-lg font-medium hover:bg-primary-50 active:bg-primary-100 transition-colors focus:outline-none focus:ring-2 focus:ring-primary-400 focus:ring-offset-2 min-h-[48px] sm:min-h-[44px]"
            aria-label="Voltar para página inicial"
          >
            Voltar
          </a>
          <button
            type="submit"
            class="flex-1 flex items-center justify-center px-6 py-3 sm:py-2.5 bg-primary-500 hover:bg-primary-600 active:bg-primary-700 text-white rounded-lg font-medium transition-colors focus:outline-none focus:ring-2 focus:ring-primary-400 focus:ring-offset-2 min-h-[48px] sm:min-h-[44px]"
            aria-label="Entrar na conta"
          >
            Entrar
          </button>
        </div>
      </form>
    </div>
  </section>
{% endblock %}
