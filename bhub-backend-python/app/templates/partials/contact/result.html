{% if contact_result and contact_result.success %}
  <div class="p-4 bg-primary-50 border border-primary-200 rounded-lg text-primary-800 flex items-center gap-3 animate-fade-in" role="alert">
    <span class="text-primary-600 flex-shrink-0">
      <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
    </span>
    <div>{{ contact_result.message }}</div>
  </div>
{% elif contact_result %}
  <div class="p-4 bg-red-50 border border-red-200 rounded-lg text-red-800 flex items-center gap-3 animate-fade-in" role="alert">
    <span class="text-red-600 flex-shrink-0">
      <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    </span>
    <div>{{ contact_result.message }}</div>
  </div>
{% endif %}
