<!-- Translation Result -->
<div class="text-slate-700 leading-relaxed prose prose-slate max-w-none" id="translated-content">
    <!-- Content will be rendered via JS -->
</div>

<script>
    (function() {
        const rawText = {{ translated_text | tojson | safe }};
        const container = document.getElementById('translated-content');
        if (container && window.marked) {
            container.innerHTML = marked.parse(rawText);
        } else {
            container.textContent = rawText;
        }
    })();
</script>

<div class="mt-4 flex items-center gap-3">
    {% if is_cached %}
    <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium bg-green-50 text-green-700 border border-green-100">
        {{ icon('zap', 'w-3 h-3') | safe }}
        Traduzido (Cache)
    </span>
    {% else %}
    <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium bg-blue-50 text-blue-700 border border-blue-100">
        {{ icon('sparkles', 'w-3 h-3') | safe }}
        Traduzido (IA)
    </span>
    {% endif %}
</div>

<!-- OOB Swap: Update external button state -->
<div id="translate-btn" hx-swap-oob="true" class="inline-flex items-center gap-2 px-4 py-2.5 bg-green-50 border border-green-200 shadow-sm rounded-lg text-sm font-medium text-green-700 min-h-[44px] cursor-default">
    <span class="translate-icon">{{ icon('check', 'w-4 h-4', aria_hidden=True) | safe }}</span>
    <span class="translate-label">Traduzido</span>
</div>
