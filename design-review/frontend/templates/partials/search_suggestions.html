{% if suggestions %}
    <ul class="py-2">
        {% for s in suggestions %}
        <li>
            <button 
                class="w-full text-left px-4 py-2 text-sm text-slate-700 hover:bg-blue-50 hover:text-blue-700 flex items-center gap-2 group transition-colors"
                hx-get="/articles?search={{ s }}"
                hx-target="#articles-grid"
                onclick="document.querySelector('[name=search]').value = this.querySelector('.truncate').textContent; document.getElementById('search-results').classList.add('hidden')"
            >
                <span class="text-slate-400 group-hover:text-blue-400">{{ icon('search', 'w-3 h-3') | safe }}</span>
                <span class="truncate">{{ s }}</span>
            </button>
        </li>
        {% endfor %}
    </ul>
{% else %}
    <!-- Optional: Show 'No results' or nothing -->
{% endif %}
